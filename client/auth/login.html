<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | LetsBlog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">

    <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">
      Welcome Back
    </h2>

    <p class="text-center text-gray-500 mb-6">
      Login with your account
    </p>

    <!-- ERROR MESSAGE -->
    <div id="errorBox" class="hidden bg-red-100 text-red-600 p-3 rounded-lg text-sm mb-4"></div>

    <!-- FORM -->
    <form id="loginForm" class="space-y-4">

      <!-- Email or Username -->
      <div>
        <label class="text-sm font-medium">Email or Username</label>
        <input 
          type="text"
          name="identifier"
          required
          class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Enter email or username"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm font-medium">Password</label>
        <input 
          type="password"
          name="password"
          required
          class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Enter password"
        />
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
      >
        Login
      </button>

    </form>

    <p class="text-center text-sm mt-6">
      Don’t have an account?
      <a href="./register.html" class="text-blue-600 font-semibold">Register</a>
    </p>

  </div>

  <!-- LINK TO JS -->
   <script src="..js/endpoints.js"></script>
  <script src="../js/api.js"></script>

</body>
</html>
