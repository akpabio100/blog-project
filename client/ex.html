<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RealVibex blog site</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DARK MODE CONFIG -->
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <!-- ICON LIBRARY -->
    <script src="https://unpkg.com/feather-icons"></script>
  </head>

  <body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition">

    <!-- HEADER -->
    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 md:px-6">
        <div class="flex items-center justify-between h-[80px] md:h-[90px]">

          <!-- LOGO -->
          <a href="./index.html" class="flex items-center gap-3">
            <img src="./img/logo.png" class="h-[70px] md:h-[80px] w-auto object-contain"/>
            <span class="text-xl md:text-3xl font-bold text-gray-900 dark:text-white tracking-tight">
              Realvibex
            </span>
          </a>

          <!-- NAV -->
          <nav class="hidden md:flex items-center gap-8 text-[16px] font-medium text-gray-700 dark:text-gray-300">
            <a href="./index.html" class="hover:text-black dark:hover:text-white">Home</a>
            <a href="./about.html" class="hover:text-black dark:hover:text-white">About</a>
            <a href="./contact.html" class="hover:text-black dark:hover:text-white">Contact</a>

            <!-- PAGES -->
            <div class="relative group py-8">
              <button class="flex items-center gap-1 hover:text-black dark:hover:text-white">
                Pages
                <svg class="w-4 h-4 transition group-hover:rotate-180">
                  <path d="M19 9l-7 7-7-7" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
              </button>

              <div class="absolute left-0 top-full w-56 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-1000">
                <a href="./auth/login.html" class="block px-5 py-3 hover:bg-gray-100 dark:hover:bg-gray-800">Login</a>
                <a href="./auth/register.html" class="block px-5 py-3 hover:bg-gray-100 dark:hover:bg-gray-800">Register</a>
                <a href="./profile.html" class="block px-5 py-3 hover:bg-gray-100 dark:hover:bg-gray-800">Profile</a>
                <a href="./faq.html" class="block px-5 py-3 hover:bg-gray-100 dark:hover:bg-gray-800">FAQ</a>
              </div>
            </div>

            <!-- FEATURES -->
            <div class="relative group py-8">
              <button class="flex items-center gap-1 hover:text-black dark:hover:text-white">
                Features
                <svg class="w-4 h-4 transition duration-800 group-hover:rotate-180">
                  <path d="M19 9l-7 7-7-7" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
              </button>

              <div class="absolute left-1/2 -translate-x-1/2 top-full w-[95vw] md:w-[850px] bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-1000 ease-in-out p-6 md:p-10">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10">

                  <div>
                    <h3 class="text-xs font-semibold text-gray-400 uppercase mb-4">Content</h3>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Latest Posts</a>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Trending</a>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Popular</a>
                  </div>

                  <div>
                    <h3 class="text-xs font-semibold text-gray-400 uppercase mb-4">Explore</h3>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Categories</a>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Tags</a>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Authors</a>
                  </div>

                  <div>
                    <h3 class="text-xs font-semibold text-gray-400 uppercase mb-4">Tools</h3>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Search</a>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Newsletter</a>
                    <a href="#" class="block py-2 hover:pl-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">Bookmarks</a>
                  </div>

                </div>
              </div>
            </div>
          </nav>

          <!-- RIGHT -->
          <div class="hidden md:flex items-center gap-4">

            <!-- TOGGLE -->
            <button id="themeToggle" class="p-2 rounded-md border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition">
              <i data-feather="moon" id="moonIcon"></i>
              <i data-feather="sun" id="sunIcon" class="hidden"></i>
            </button>

            <a href="./auth/login.html" class="text-sm">Login</a>

            <a href="./auth/register.html"
              class="bg-black text-white px-5 py-2 rounded-md text-sm">
              Sign Up
            </a>
          </div>

          <!-- MOBILE -->
          <button class="md:hidden">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>

        </div>
      </div>
    </header>

    <!-- YOUR WHOLE CONTENT REMAINS SAME (JUST DARK CLASSES APPLIED) -->

    <!-- FOOTER -->
    <footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 mt-16">
      <div class="max-w-7xl mx-auto px-4 md:px-6 py-12">

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-10">

          <div>
            <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Realvibex</h2>
            <p class="text-sm text-gray-600 dark:text-gray-400">
              Discover modern blog content, trending topics, and creative insights.
            </p>

            <div class="flex gap-4 mt-5">
              <i data-feather="twitter"></i>
              <i data-feather="instagram"></i>
              <i data-feather="linkedin"></i>
              <i data-feather="github"></i>
            </div>
          </div>

          <!-- REST OF YOUR FOOTER UNCHANGED -->

        </div>
      </div>
    </footer>

    <!-- SCRIPTS -->
    <script>
      const toggleBtn = document.getElementById("themeToggle");
      const html = document.documentElement;
      const sunIcon = document.getElementById("sunIcon");
      const moonIcon = document.getElementById("moonIcon");

      if (localStorage.getItem("theme") === "dark") {
        html.classList.add("dark");
        sunIcon.classList.remove("hidden");
        moonIcon.classList.add("hidden");
      }

      toggleBtn.addEventListener("click", () => {
        html.classList.toggle("dark");

        if (html.classList.contains("dark")) {
          localStorage.setItem("theme", "dark");
          sunIcon.classList.remove("hidden");
          moonIcon.classList.add("hidden");
        } else {
          localStorage.setItem("theme", "light");
          sunIcon.classList.add("hidden");
          moonIcon.classList.remove("hidden");
        }
      });

      feather.replace();
    </script>

    <script src="./js/main.js"></script>
    <script src="./js/endpoint.js"></script>
    <script src="./js/api.js"></script>

  </body>
</html>
